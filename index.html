<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1-1: Grid Map</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Grid Map Development</h1>
    <p style="font-size: 1.1em;">You can specify the input dimensions</p>
    <div class="controls">
        <label for="grid-size">Enter a number between 5 and 9:</label>
        <input type="number" id="grid-size" min="5" max="9" value="5">
        <button id="generate-btn">Generate Square</button>
    </div>

    <div id="workspace" style="display: none;">
        <h2 id="grid-title"></h2>
        <div class="instruction">
            <p>Click on a cell to set :</p>
            <p>STEP1. one start cell to green</p>
            <p>STEP2. one end cell to red</p>
            <p>STEP3. <span id="obs-count-text">three</span> wall blocked cell to gray</p>
        </div>
        <div id="grid" class="grid-container"></div>

        <div class="instruction" style="margin-top: 20px;">
            <p><strong>Parameter Tuning:</strong></p>
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 15px;">
                <div>
                    <label>Discount Factor (&gamma;): <span id="gamma-val">0.9</span></label><br>
                    <input type="range" id="gamma-slider" min="0" max="1" step="0.1" value="0.9">
                </div>
                <div>
                    <label>Step Reward (Risk penalty): <span id="reward-val">-1</span></label><br>
                    <input type="range" id="reward-slider" min="-10" max="0" step="1" value="-1">
                </div>
            </div>
            <p>2. Choose an algorithm to run:</p>
            <div style="display: flex; gap: 10px;">
                <button id="eval-btn-pe">HW1-2: Policy Evaluation (Random Average)</button>
                <button id="eval-btn-vi">HW1-3: Value Iteration & Optimal Path</button>
            </div>
        </div>

        <div id="results" style="display: none; flex-wrap: wrap; gap: 40px; margin-top: 40px; padding-bottom: 50px;">
            <div>
                <h3>Value Matrix</h3>
                <div id="value-grid" class="grid-container"></div>
            </div>
            <div>
                <h3>Policy Matrix</h3>
                <div id="policy-grid" class="grid-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
